{% extends "main.html" %}

{% block tabs %}
{{ super() }}
<style>
  /* Hide the hero section from index.md if present, or handle via CSS */
  .md-content__inner {
    margin-top: 0;
    padding-top: 0;
  }

  .hero-container {
    background: linear-gradient(135deg, #009688 0%, #004d40 100%);
    padding: 4rem 2rem;
    color: white;
    text-align: center;
    border-radius: 0 0 2rem 2rem;
    margin-bottom: 2rem;
  }

  .hero-title {
    font-size: 3rem !important;
    font-weight: 800 !important;
    color: white !important;
    margin-bottom: 0.5rem !important;
  }

  .hero-subtitle {
    font-size: 1.5rem;
    opacity: 0.9;
    margin-bottom: 2rem;
  }

  .md-button--primary {
    background-color: #ffc107 !important;
    color: #004d40 !important;
    border: none !important;
  }

  .md-button {
    margin: 0.5rem;
  }
</style>

<section class="hero-container">
  <div class="hero-content">
    <div class="hero-overlay">
      <h1 class="hero-title">Backends & APIs</h1>
      <p class="hero-subtitle">Engenharia de Backends e APIs Modernas</p>
      <div class="hero-actions">
        <a href="aulas/aula-01/" class="md-button md-button--primary">Começar Agora</a>
        <a href="aulas/" class="md-button">Ver Aulas</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block content %}
<!-- Render the rest of index.md content below the parallax header -->
<div class="mdx-container">
  {{ super() }}
</div>
{% endblock %}
